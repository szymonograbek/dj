type: track
description: Track lifecycle and evidence note
path:
  pattern: "tracks/{slug}-{artist_slug}.md"
frontmatter:
  required:
    name: { type: string }
    artists:
      type: array
      items: { type: string }
    status:
      type: enum
      values: [known, recommended, rejected]
    tags:
      type: array
      items: { type: string }
  optional:
    sources:
      type: array
      items:
        type: enum
        values: [recently-played, saved-tracks, dj-playlist, recommendation, explicit-preference, user-feedback]
    spotify_id: { type: string }
search:
  fields: [name, artists, status, sources, tags]
  title: "{name}"
body: |
  # Track: {name}

  Spotify track id: {spotify_id}
  Known because: user history / playlist / recommendation / explicit preference
  Sources: recently-played / saved-tracks / dj-playlist / recommendation / explicit-preference / user-feedback
  Status: known / recommended / rejected

  Notes:
